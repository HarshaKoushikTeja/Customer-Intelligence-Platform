version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: cip_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cip_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cip_pass}
      POSTGRES_DB: ${POSTGRES_DB:-customer_intelligence}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cip_user -d customer_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cip_api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Dashboard ────────────────────────────────────────────────
  dashboard:
    image: python:3.10-slim
    container_name: cip_dashboard
    working_dir: /app
    env_file: .env
    command: >
      bash -c "pip install streamlit plotly pandas psycopg2-binary requests --quiet &&
               streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
    depends_on:
      - api

  # ── Airflow (single container, local mode) ────────────────────────────
  airflow:
    image: apache/airflow:2.8.1-python3.10
    container_name: cip_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-cip_user}:${POSTGRES_PASSWORD:-cip_pass}@postgres/${POSTGRES_DB:-customer_intelligence}
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./pipeline:/opt/airflow/dags
    depends_on:
      postgres:
        condition: service_healthy
    command: standalone

volumes:
  postgres_data:
